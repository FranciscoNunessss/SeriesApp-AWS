name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'aws/lambda/**'
      - 'src/**'

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          cd aws/lambda
          pip install -r requirements.txt -t packages/
      
      - name: Create deployment package
        run: |
          cd aws/lambda
          zip -r function.zip functions/ packages/ -x "*.pyc" "*.pyo" "tests/*"
      
      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name seriesapp-main \
            --zip-file fileb://aws/lambda/function.zip
      
      - name: Deploy daily notifications Lambda
        run: |
          cd aws/lambda
          zip -r daily-function.zip functions/daily_notifications.py packages/ -x "*.pyc" "*.pyo"
          aws lambda update-function-code \
            --function-name seriesapp-daily-notifications \
            --zip-file fileb://daily-function.zip

  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install
      
      - name: Build
        working-directory: ./frontend
        run: pnpm build
        env:
          VITE_API_BASE_URL: https://${{ secrets.API_GATEWAY_ID }}.execute-api.us-east-1.amazonaws.com
      
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=frontend/dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
